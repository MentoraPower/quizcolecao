<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Coleção Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--brown-1:#7a5230;--brown-2:#5a3a1e;--brown-soft:#a97b4f;--ink:#2b2320;--muted:#8a7d74;--line:#e7e0da;--line-soft:#f0ebe6;--bg:#faf7f3;--key-bg:#f7f3ef}
  *{box-sizing:border-box;margin:0;padding:0}
  [hidden]{display:none!important}
  body{font-family:'Instrument Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  input,button{font-family:inherit}

  /* Login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:#fff;border:1.5px solid var(--line);border-radius:18px;padding:32px 28px}
  .login-card h1{font-size:22px;margin-bottom:6px}
  .login-card p{color:var(--muted);font-size:14px;margin-bottom:22px}
  .login-card label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin:12px 0 6px}
  .login-card input{width:100%;font-size:16px;border:1.5px solid var(--line);border-radius:10px;padding:13px 14px;color:var(--ink)}
  .login-card input:focus{outline:none;border-color:var(--brown-1)}
  .err{color:#c0392b;font-size:13px;margin-top:12px;min-height:18px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:999px;cursor:pointer;padding:14px 24px;font-size:15px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--brown-soft),var(--brown-1) 60%,var(--brown-2));transition:.15s;text-decoration:none}
  .btn:hover{filter:brightness(1.05)}
  .btn.full{width:100%;margin-top:20px}
  .btn.ghost{background:none;color:var(--brown-1);border:1.5px solid var(--line);padding:9px 16px;font-size:14px}

  /* App */
  .top{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1.5px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px}
  .brand{font-weight:700;letter-spacing:2px;font-size:15px;color:var(--brown-1)}
  .brand small{display:block;letter-spacing:0;font-size:11px;color:var(--muted);font-weight:600}
  .tabs{display:flex;gap:4px;background:var(--key-bg);border-radius:999px;padding:4px}
  .tab{border:0;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted);padding:9px 18px;border-radius:999px;transition:.15s}
  .tab:hover{color:var(--brown-1)}
  .tab.active{background:var(--brown-1);color:#fff}
  .live{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:#3f9e46;letter-spacing:.3px}
  .live i{width:9px;height:9px;border-radius:50%;background:#3f9e46;box-shadow:0 0 0 0 rgba(63,158,70,.5);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,158,70,.5)}70%{box-shadow:0 0 0 8px rgba(63,158,70,0)}100%{box-shadow:0 0 0 0 rgba(63,158,70,0)}}
  .wrap{max-width:none;width:100%;margin:0;padding:26px 32px 60px}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:26px}
  .kpi{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:18px 20px}
  .kpi .n{font-size:30px;font-weight:800;letter-spacing:-.5px}
  .kpi .l{font-size:13px;color:var(--muted);margin-top:2px}

  /* Funil */
  .card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:22px 24px;margin-bottom:20px}
  .card h2{font-size:16px;margin-bottom:4px}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .funnel{display:flex;flex-direction:column;gap:9px}
  .frow{display:grid;grid-template-columns:190px 1fr;align-items:center;gap:14px}
  .fname{font-size:14px;font-weight:600;color:var(--ink)}
  .fbarwrap{position:relative;background:var(--key-bg);border-radius:8px;height:38px;overflow:hidden}
  .fbar{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--brown-soft),var(--brown-1));min-width:2px;transition:width .6s ease}
  .fmeta{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:13px;font-weight:600}
  .fmeta .c{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2)}
  .fmeta .p{color:var(--brown-2)}
  .drop{color:#c0392b;font-size:12px;font-weight:600}

  /* Gráficos */
  .charts2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .chart{margin-top:10px}
  .hbars{display:flex;flex-direction:column;gap:10px}
  .hbar{display:grid;grid-template-columns:180px 1fr;align-items:center;gap:12px}
  .hlbl{font-size:13px;font-weight:600;color:var(--ink)}
  .htrack{position:relative;background:var(--key-bg);border-radius:8px;height:32px;overflow:hidden}
  .hfill{height:100%;background:linear-gradient(90deg,var(--brown-soft),var(--brown-1));border-radius:8px;min-width:2px;transition:width .6s ease}
  .hval{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:var(--brown-2)}
  @media(max-width:900px){ .charts2{grid-template-columns:1fr} .hbar{grid-template-columns:130px 1fr} }

  /* Tabela leads */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:0 12px 12px}
  td{padding:14px 12px;border-top:1px solid var(--line-soft);font-size:14px;vertical-align:middle}
  tr.lead-row{cursor:pointer}
  tr.lead-row:hover td{background:var(--key-bg)}
  .badge{display:inline-block;background:var(--key-bg);border:1px solid var(--line);color:var(--brown-1);font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
  .score-pill{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:var(--brown-1);color:#fff;font-weight:800;font-size:14px}

  /* Detalhe do lead (100% largura) */
  .detail-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:26px}
  .field{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:14px 16px}
  .field .k{font-size:12px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:5px}
  .field .v{font-size:16px;font-weight:600;word-break:break-word}
  .field .v a{color:var(--brown-1)}
  .qa{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .qa li{border:1.5px solid var(--line);border-radius:12px;padding:16px 18px;background:#fff}
  .qa .q{font-size:13px;color:var(--muted);margin-bottom:6px;line-height:1.35}
  .qa .a{font-size:16px;font-weight:600;color:var(--ink);line-height:1.4}
  @media(max-width:720px){ .qa{grid-template-columns:1fr} }
  .muted{color:var(--muted)}
  .empty{color:var(--muted);text-align:center;padding:40px;font-size:15px}
  .loading{color:var(--muted);text-align:center;padding:40px}

  @media(max-width:640px){
    .frow{grid-template-columns:120px 1fr;gap:8px}
    .fname{font-size:12px}
    th:nth-child(3),td:nth-child(3){display:none}
    .wrap{padding:20px 14px 50px}
    .top{padding:0 14px}
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="loginView">
  <div class="login-card">
    <h1>Dashboard</h1>
    <p>Coleção Beauty — acesso restrito</p>
    <form id="loginForm">
      <label>E-mail</label>
      <input type="email" id="email" autocomplete="username" required>
      <label>Senha</label>
      <input type="password" id="password" autocomplete="current-password" required>
      <button type="submit" class="btn full" id="loginBtn">Entrar</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- APP -->
<div id="appView" hidden>
  <div class="top">
    <div class="tabs">
      <button class="tab active" data-tab="analytics">Analytics</button>
      <button class="tab" data-tab="leads">Leads</button>
    </div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="live"><i></i> Ao vivo</span>
      <button class="btn ghost" id="logoutBtn">Sair</button>
    </div>
  </div>

  <div class="wrap">
    <!-- ANALYTICS -->
    <div id="tabAnalytics">
      <div class="kpis" id="kpis"></div>
      <div class="card">
        <h2>Funil do quiz</h2>
        <div class="funnel" id="funnel"><div class="loading">Carregando...</div></div>
      </div>
      <div class="card">
        <h2>Visitas por dia</h2>
        <div class="chart" id="chartVisits"></div>
      </div>
      <div class="charts2">
        <div class="card"><h2>Perfil dos leads</h2><div class="chart" id="chartPerfil"></div></div>
        <div class="card"><h2>Beauty Score dos leads</h2><div class="chart" id="chartScore"></div></div>
      </div>
    </div>

    <!-- LEADS -->
    <div id="tabLeads" hidden>
      <div id="leadsList">
        <div class="card">
          <h2>Leads capturados</h2>
          <p class="sub" id="leadsCount"></p>
          <div id="leadsTable"><div class="loading">Carregando...</div></div>
        </div>
      </div>
      <div id="leadDetail" hidden></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPA_URL='https://knqfiqyvpglyfabsmmlm.supabase.co';
const SUPA_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtucWZpcXl2cGdseWZhYnNtbWxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDgxMzIsImV4cCI6MjA5OTEyNDEzMn0.DQfVd2XMpSjqkCyuX4SmIxNzMARjr9jFh0boTt2bZTI';
const db = supabase.createClient(SUPA_URL, SUPA_ANON);

const $ = s=>document.querySelector(s);
const loginView=$('#loginView'), appView=$('#appView');

/* ===== AUTH ===== */
$('#loginForm').addEventListener('submit', async e=>{
  e.preventDefault();
  const btn=$('#loginBtn'); btn.disabled=true; $('#loginErr').textContent='';
  const { error } = await db.auth.signInWithPassword({ email:$('#email').value.trim(), password:$('#password').value });
  btn.disabled=false;
  if(error){ $('#loginErr').textContent='E-mail ou senha inválidos.'; return; }
  showApp();
});
$('#logoutBtn').addEventListener('click', async ()=>{ await db.auth.signOut(); loginView.hidden=false; appView.hidden=true; });

async function boot(){
  const { data } = await db.auth.getSession();
  if(data.session){ showApp(); } else { loginView.hidden=false; appView.hidden=true; }
}
function showApp(){ loginView.hidden=true; appView.hidden=false; loadAnalytics(); loadLeads(); setupRealtime(); }

/* ===== TEMPO REAL ===== */
let rtSetup=false;
function setupRealtime(){
  if(rtSetup) return; rtSetup=true;
  let t; const refresh=()=>{ clearTimeout(t); t=setTimeout(()=>{ loadAnalytics(); loadLeads(); },1200); };
  try{
    db.channel('rt-dash')
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'events'},refresh)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'leads'},refresh)
      .subscribe();
  }catch(e){ console.warn('realtime indisponível',e); }
  // fallback: atualiza a cada 15s de qualquer forma
  setInterval(()=>{ loadAnalytics(); loadLeads(); }, 15000);
}

/* ===== TABS ===== */
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));
  const tab=t.getAttribute('data-tab');
  $('#tabAnalytics').hidden = tab!=='analytics';
  $('#tabLeads').hidden = tab!=='leads';
  if(tab==='leads'){ showLeadsList(); }
});

/* ===== ANALYTICS / FUNIL ===== */
const FUNNEL=[
  {key:'Visitou o quiz', f:e=>e.event==='quiz_view'},
  {key:'Iniciou', f:e=>e.event==='quiz_start'},
  {key:'P1 · Área', f:e=>e.event==='quiz_step'&&e.step==='area'},
  {key:'P2 · Dor', f:e=>e.event==='quiz_step'&&e.step==='dor'},
  {key:'P3 · WhatsApp', f:e=>e.event==='quiz_step'&&e.step==='whats'},
  {key:'P4 · Pós-envio', f:e=>e.event==='quiz_step'&&e.step==='pos'},
  {key:'P5 · Preço', f:e=>e.event==='quiz_step'&&e.step==='preco'},
  {key:'P6 · Materiais', f:e=>e.event==='quiz_step'&&e.step==='materiais'},
  {key:'P7 · Transformação', f:e=>e.event==='quiz_step'&&e.step==='transf'},
  {key:'P8 · Nota', f:e=>e.event==='quiz_step'&&e.step==='auto'},
  {key:'Concluiu', f:e=>e.event==='quiz_complete'},
  {key:'Viu o resultado', f:e=>e.event==='quiz_result_view'},
  {key:'Virou lead', f:e=>e.event==='lead_capturado'},
  {key:'Clicou na oferta', f:e=>e.event==='offer_cta_click'},
  {key:'Foi pro checkout', f:e=>e.event==='checkout_click'},
];

async function loadAnalytics(){
  const [ev, ld] = await Promise.all([
    db.from('events').select('visitor_id,event,step,created_at').limit(100000),
    db.from('leads').select('perfil,beauty_score,created_at').limit(5000)
  ]);
  const events = ev.data||[];
  const leads = ld.data||[];
  const leadsCount = leads.length;
  // visitantes únicos = visitor_id distintos nos eventos (robusto p/ qualquer aparelho)
  const visitors = new Set(events.map(e=>e.visitor_id).filter(Boolean)).size;

  const counts = FUNNEL.map(node=>{ const s=new Set(); for(const e of events){ if(node.f(e)) s.add(e.visitor_id); } return s.size; });
  const top = Math.max(counts[0]||0, visitors||0, 1);
  const iniciou = counts[1]||0, concluiu = counts[10]||0;

  $('#kpis').innerHTML = [
    ['Visitantes únicos', visitors||0],
    ['Iniciaram o quiz', iniciou],
    ['Concluíram', concluiu],
    ['Viraram lead', leadsCount],
    ['Taxa de conclusão', (visitors? Math.round(concluiu/visitors*100):0)+'%'],
  ].map(([l,n])=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  const base = counts[0]||visitors||1;
  $('#funnel').innerHTML = FUNNEL.map((node,i)=>{
    const c=counts[i];
    const pct = base? Math.round(c/base*100):0;
    const w = Math.max(2, Math.round(c/top*100));
    const drop = i>0 ? counts[i-1]-c : 0;
    const dropTxt = i>0 && counts[i-1]>0 ? ` <span class="drop">−${Math.round(drop/counts[i-1]*100)}%</span>` : '';
    return `<div class="frow"><div class="fname">${node.key}${dropTxt}</div>
      <div class="fbarwrap"><div class="fbar" style="width:${w}%"></div>
      <div class="fmeta"><span class="c">${c}</span><span class="p">${pct}%</span></div></div></div>`;
  }).join('');

  // Visitas por dia (montanha)
  const byDay={};
  events.forEach(e=>{ if(e.event==='quiz_view'&&e.created_at){ const d=e.created_at.slice(0,10); byDay[d]=(byDay[d]||0)+1; } });
  const areaData=Object.keys(byDay).sort().map(d=>({label:d.slice(8,10)+'/'+d.slice(5,7), value:byDay[d]}));
  $('#chartVisits').innerHTML = svgArea(areaData);

  // Perfil dos leads (barras horizontais)
  const perfis=['Apresentação improvisada','Valor pouco percebido','Profissional em crescimento','Marca em evolução'];
  $('#chartPerfil').innerHTML = hBars(perfis.map(p=>({label:p, value:leads.filter(l=>l.perfil===p).length})));

  // Beauty Score por faixa (barras)
  const faixas=[['0–35',0,35],['36–60',36,60],['61–80',61,80],['81–100',81,100]];
  $('#chartScore').innerHTML = svgBars(faixas.map(([lb,a,b])=>({label:lb, value:leads.filter(l=>l.beauty_score!=null&&l.beauty_score>=a&&l.beauty_score<=b).length})));
}

/* ===== Gráficos (SVG, sem libs) ===== */
function svgArea(data){
  if(!data.length) return '<div class="empty">Sem dados ainda.</div>';
  const W=680,H=210,pl=34,pr=14,pt=14,pb=30, max=Math.max(1,...data.map(d=>d.value));
  const iw=W-pl-pr, ih=H-pt-pb;
  const xf=i=>pl+(data.length===1?iw/2:i*iw/(data.length-1)), yf=v=>pt+ih-(v/max*ih);
  const pts=data.map((d,i)=>[xf(i),yf(d.value)]);
  const line=pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const area=`${xf(0)},${pt+ih} `+line+` ${xf(data.length-1)},${pt+ih}`;
  let grid=''; [0,.5,1].forEach(t=>{ const y=pt+ih-t*ih; grid+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#efe9e2"/><text x="${pl-6}" y="${y+4}" text-anchor="end" font-size="11" fill="#8a7d74">${Math.round(max*t)}</text>`; });
  let xl=''; const idxs=data.length<=7?data.map((_,i)=>i):[0,Math.floor(data.length/2),data.length-1];
  idxs.forEach(i=>{ xl+=`<text x="${xf(i)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#8a7d74">${data[i].label}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block"><defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a97b4f" stop-opacity=".38"/><stop offset="1" stop-color="#a97b4f" stop-opacity="0"/></linearGradient></defs>${grid}<polygon points="${area}" fill="url(#ga)"/><polyline points="${line}" fill="none" stroke="#7a5230" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#7a5230"/>`).join('')}${xl}</svg>`;
}
function hBars(data){
  if(!data.length||data.every(d=>!d.value)) return '<div class="empty">Sem leads ainda.</div>';
  const max=Math.max(1,...data.map(d=>d.value));
  return '<div class="hbars">'+data.map(d=>`<div class="hbar"><div class="hlbl">${esc(d.label)}</div><div class="htrack"><div class="hfill" style="width:${Math.max(2,Math.round(d.value/max*100))}%"></div><span class="hval">${d.value}</span></div></div>`).join('')+'</div>';
}
function svgBars(data){
  if(!data.length||data.every(d=>!d.value)) return '<div class="empty">Sem leads ainda.</div>';
  const W=680,H=210,pl=16,pr=16,pt=20,pb=40, max=Math.max(1,...data.map(d=>d.value));
  const iw=W-pl-pr, ih=H-pt-pb, gap=iw/data.length, bw=Math.min(90,gap*.6);
  let out=''; data.forEach((d,i)=>{ const x=pl+gap*i+gap/2, h=d.value/max*ih, y=pt+ih-h;
    out+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(1,h).toFixed(1)}" rx="6" fill="#7a5230"/>`;
    out+=`<text x="${x}" y="${(y-7).toFixed(1)}" text-anchor="middle" font-size="14" font-weight="700" fill="#2b2320">${d.value}</text>`;
    out+=`<text x="${x}" y="${H-14}" text-anchor="middle" font-size="12" fill="#8a7d74">${esc(d.label)}</text>`; });
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">${out}</svg>`;
}

/* ===== LEADS ===== */
let LEADS=[];
async function loadLeads(){
  const { data, error } = await db.from('leads').select('*').order('created_at',{ascending:false}).limit(2000);
  if(error){ $('#leadsTable').innerHTML='<div class="empty">Erro ao carregar.</div>'; return; }
  LEADS=data||[];
  $('#leadsCount').textContent = LEADS.length+' lead'+(LEADS.length===1?'':'s');
  if(!LEADS.length){ $('#leadsTable').innerHTML='<div class="empty">Nenhum lead ainda.</div>'; return; }
  $('#leadsTable').innerHTML = `<table><thead><tr>
      <th>Nome</th><th>E-mail</th><th>WhatsApp</th><th>Perfil</th><th>Score</th><th>Data</th>
    </tr></thead><tbody>${LEADS.map((l,idx)=>`
      <tr class="lead-row" data-i="${idx}">
        <td><b>${esc(l.nome)||'—'}</b></td>
        <td>${esc(l.email)||'—'}</td>
        <td>${esc(l.telefone)||'—'}</td>
        <td>${l.perfil?`<span class="badge">${esc(l.perfil)}</span>`:'—'}</td>
        <td>${l.beauty_score!=null?`<span class="score-pill">${l.beauty_score}</span>`:'—'}</td>
        <td class="muted">${fmtDate(l.created_at)}</td>
      </tr>`).join('')}</tbody></table>`;
  document.querySelectorAll('.lead-row').forEach(r=>r.onclick=()=>openLead(+r.getAttribute('data-i')));
}
function showLeadsList(){ $('#leadsList').hidden=false; $('#leadDetail').hidden=true; }
function openLead(idx){
  const l=LEADS[idx]; if(!l) return;
  const resp = Array.isArray(l.respostas)? l.respostas : (l.respostas? tryJson(l.respostas):[]);
  $('#leadDetail').innerHTML = `
    <div class="detail-head">
      <button class="btn ghost" id="backLeads">← Voltar</button>
      <h2 style="font-size:20px">${esc(l.nome)||'Lead'}</h2>
      ${l.beauty_score!=null?`<span class="score-pill" style="width:44px;height:44px;font-size:16px">${l.beauty_score}</span>`:''}
    </div>
    <div class="detail-grid">
      <div class="field"><div class="k">Nome</div><div class="v">${esc(l.nome)||'—'}</div></div>
      <div class="field"><div class="k">E-mail</div><div class="v"><a href="mailto:${esc(l.email)}">${esc(l.email)||'—'}</a></div></div>
      <div class="field"><div class="k">WhatsApp</div><div class="v"><a href="https://wa.me/${(l.telefone||'').replace(/[^0-9]/g,'')}" target="_blank">${esc(l.telefone)||'—'}</a></div></div>
      <div class="field"><div class="k">Perfil</div><div class="v">${esc(l.perfil)||'—'}</div></div>
      <div class="field"><div class="k">Beauty Score</div><div class="v">${l.beauty_score!=null?l.beauty_score+' / 100':'—'}</div></div>
      <div class="field"><div class="k">Data</div><div class="v">${fmtDate(l.created_at)}</div></div>
    </div>
    <div class="card">
      <h2>Respostas do quiz</h2>
      <p class="sub">O que este lead selecionou em cada pergunta.</p>
      ${resp && resp.length ? `<ul class="qa">${resp.map(r=>`<li><div class="q">${esc(r.pergunta)}</div><div class="a">${esc(cleanResp(r.resposta))}</div></li>`).join('')}</ul>` : '<div class="empty">Sem respostas registradas.</div>'}
    </div>`;
  $('#leadsList').hidden=true; $('#leadDetail').hidden=false;
  $('#backLeads').onclick=showLeadsList;
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== helpers ===== */
function esc(s){ return s==null?'':String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function cleanResp(s){ return String(s==null?'':s).replace(/^([A-J])(?=[A-ZÀ-Ý])/,''); } // remove prefixo de letra da opção (leads antigos)
function tryJson(s){ try{return JSON.parse(s);}catch(e){return [];} }
function fmtDate(s){ if(!s)return'—'; const d=new Date(s); return d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}); }

boot();
</script>
</body>
</html>
